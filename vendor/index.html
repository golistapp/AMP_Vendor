<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard | AMP KART</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/vendor.css">
</head>
<body>

      <header class="vendor-header">
        <div class="shop-info" style="display: flex; align-items: center; gap: 12px;">
            <div id="headerLogoContainer" style="width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--accent-gold); box-shadow: 0 2px 8px rgba(0,0,0,0.3);">
                <i class="fa-solid fa-store" style="font-size: 1rem; color: var(--accent-gold);"></i>
            </div>
            <h3 id="shopNameDisplay" style="margin: 0; font-size: 1.2rem; font-weight: 600;">My Shop</h3>
        </div>
        <i class="fa-solid fa-bell text-gold" style="font-size: 1.2rem;"></i>
    </header>


    <main class="vendor-content">

        <section id="view-dashboard" class="app-view active">
            <div class="earnings-card">
                <p>Pending Payments</p>
                <h2 id="vendor-earnings">₹0</h2>
                <small>Settlement Every Weekly</small>
            </div>

            <div class="stats-grid" style="margin-top: 20px;">
                <div class="stat-card" style="padding: 15px;">
                    <h4 style="color: #666; font-size: 0.8rem;">Total Orders</h4>
                    <h2 id="vendor-total-orders" style="color: var(--primary-green);">0</h2>
                </div>
                <div class="stat-card" style="padding: 15px;">
                    <h4 style="color: #666; font-size: 0.8rem;">Pending Orders</h4>
                    <h2 id="vendor-pending-orders" style="color: orange;">0</h2>
                </div>
            </div>
        </section>

        <section id="view-orders" class="app-view">
            <h3 style="color: var(--primary-green); margin-bottom: 15px;">My Orders</h3>
            <div id="vendorOrderList">
                </div>
        </section>

              <section id="view-inventory" class="app-view">
            <h3 style="color: var(--primary-green); margin-bottom: 15px;">My Shop Stock</h3>
            <div id="vendorStockList">
                <div style="text-align: center; padding: 20px; color: #888;">Loading stock... ⏳</div>
            </div>
        </section>


              <section id="view-profile" class="app-view">
            <h3 style="color: var(--primary-green); margin-bottom: 15px;">Vendor Profile</h3>
            <div id="profileContainer"></div>

            <div id="profileImageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(5px);">
                <span onclick="closeProfileImageModal()" style="position:absolute; top:20px; right:30px; color:var(--accent-gold); font-size:45px; cursor:pointer; font-weight:bold;">&times;</span>
                <img id="modalProfileImg" src="" style="max-width:90%; max-height:80%; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); border: 3px solid var(--accent-gold);">
            </div>

            <div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; padding:15px; backdrop-filter: blur(4px);">
                <div style="background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 16px; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease;">
                    <span onclick="closePasswordModal()" style="position:absolute; top:15px; right:20px; font-size:28px; cursor:pointer; color:#888; line-height: 1;">&times;</span>
                    <h3 style="color: var(--primary-green); margin-bottom: 15px;"><i class="fa-solid fa-lock text-gold"></i> Change Password</h3>
                    
                    <input type="password" id="oldPwd" placeholder="Current Password" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.95rem;">
                    <input type="password" id="newPwd" placeholder="New Password" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.95rem;">
                    <input type="password" id="confirmPwd" placeholder="Confirm New Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.95rem;">
                    
                    <button onclick="submitNewPassword()" style="width: 100%; padding: 12px; background: var(--primary-green); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;">Update Password</button>
                </div>
            </div>
        </section>


    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchVendorView('dashboard')">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchVendorView('orders')">
            <i class="fa-solid fa-box"></i>
            <span>Orders</span>
        </div>
        <div class="nav-item" onclick="switchVendorView('inventory')">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>Stock</span>
        </div>
        <div class="nav-item" onclick="switchVendorView('profile')">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </div>
    </nav>

    <script>
        // Check if logged in
        let loggedInVendor = JSON.parse(localStorage.getItem('amp_logged_in_vendor'));
        if(!loggedInVendor) {
            window.location.href = 'login.html';
        } else {
            // Set Shop Name
            document.getElementById('shopNameDisplay').innerText = loggedInVendor.shop;
            
            // 🖼️ Set Shop Logo in Header
            const logoContainer = document.getElementById('headerLogoContainer');
            if(loggedInVendor.image) {
                // Agar vendor ne image upload kiya hai
                logoContainer.innerHTML = `<img src="${loggedInVendor.image}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else {
                // Default icon agar image nahi hai
                logoContainer.innerHTML = `<i class="fa-solid fa-store" style="font-size: 1.1rem; color: var(--accent-gold);"></i>`;
            }
        }

        function switchVendorView(viewId) {
    document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');

    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // Agar inventory tab hai, toh manager se load karein
    if(viewId === 'inventory') {
        loadInventoryData();
    } 
    // Agar profile tab hai, toh profile manager se load karein
    else if (viewId === 'profile') {
        loadVendorProfile();
    }
}
    </script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script src="../api/firebase-config.js"></script>
<script src="../api/image-uploader.js"></script>


<script src="js/order-handler.js"></script>
<script src="js/inventory-manager.js"></script>
<script src="js/profile-manager.js"></script>

</body>

</html>
